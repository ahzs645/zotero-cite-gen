<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<!DOCTYPE window>
<html:div xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
          xmlns:html="http://www.w3.org/1999/xhtml">

  <groupbox>
    <label><html:h2 data-l10n-id="citegen-prefs-general" /></label>

    <checkbox
      data-l10n-id="citegen-prefs-verify-doi"
      preference="extensions.zotero.citegen.verifyDOI"
    />

    <checkbox
      data-l10n-id="citegen-prefs-attach-reason"
      preference="extensions.zotero.citegen.attachReason"
    />

    <hbox align="center">
      <checkbox
        id="citegen-pref-tag-imported"
        data-l10n-id="citegen-prefs-tag-imported"
        preference="extensions.zotero.citegen.tagImported"
      />
      <html:input
        type="text"
        preference="extensions.zotero.citegen.importTag"
        style="margin-left: 8px; width: 150px;"
      />
    </hbox>
  </groupbox>

</html:div>
