name: Build Plugin

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-citation-generator-xpi
          path: .scaffold/build/zotero-citation-generator.xpi
          if-no-files-found: error

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: zotero-citation-generator-manifest
          path: .scaffold/build/addon/manifest.json
          if-no-files-found: error
